<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PatternDrill — ICT Pattern Trainer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Pattern<span>Drill</span></div>
  <a class="nav-link active" href="index.html">Drill</a>
  <a class="nav-link" href="library.html">Library</a>
  <a class="nav-link" href="stats.html">Stats</a>
</nav>

<main class="page">

  <!-- Pattern selector -->
  <div class="label">Select pattern</div>
  <div class="pattern-grid">
    <button class="pattern-chip" data-key="order-block">Order Block</button>
    <button class="pattern-chip" data-key="fair-value-gap">Fair Value Gap</button>
    <button class="pattern-chip" data-key="breaker-block">Breaker Block</button>
    <button class="pattern-chip" data-key="bos">Break of Structure</button>
    <button class="pattern-chip" data-key="choch">CHoCH</button>
    <button class="pattern-chip" data-key="liquidity-sweep">Liquidity Sweep</button>
    <button class="pattern-chip" data-key="inducement">Inducement</button>
    <button class="pattern-chip" data-key="rejection-block">Rejection Block</button>
    <button class="pattern-chip" data-key="ote">OTE Zone</button>
  </div>

  <!-- Difficulty -->
  <div class="diff-row">
    <span class="diff-label">difficulty</span>
    <button class="diff-chip selected" data-diff="1">1 — clean</button>
    <button class="diff-chip" data-diff="2">2 — realistic</button>
    <button class="diff-chip" data-diff="3">3 — live</button>
  </div>

  <!-- Chart -->
  <div class="chart-wrap" id="chart-wrap">
    <canvas id="chart-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>

    <div class="chart-empty" id="chart-empty">
      <div class="chart-empty-icon">▦</div>
      <div class="chart-empty-text">select a pattern above to begin</div>
    </div>

    <div class="chart-loader" id="chart-loader">
      <div class="loader-text">GENERATING</div>
      <div class="loader-bar"></div>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint-bar">
    <span class="hint-label">hint</span>
    <span id="hint-text" style="color: var(--text-2);">—</span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="btn-mark"   onclick="App.toggleMarkMode()" disabled>[ mark zone ]</button>
    <button class="btn" id="btn-reveal" onclick="App.reveal()"         disabled>reveal answer</button>
    <button class="btn" id="btn-clear"  onclick="App.clearMark()"      disabled>clear mark</button>
    <div class="controls-right">
      <button class="btn btn-primary" id="btn-next" onclick="App.generateChart()" disabled>next chart ↗</button>
    </div>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <!-- Score row -->
  <div class="score-row">
    <div class="score-chip" id="sc-correct">  correct  <span class="val">0</span></div>
    <div class="score-chip" id="sc-attempts"> attempts <span class="val">0</span></div>
    <div class="score-chip" id="sc-accuracy"> accuracy <span class="val">—</span></div>
    <div class="score-chip" id="sc-streak">   streak   <span class="val">0</span></div>
  </div>

</main>

<script src="js/patterns.js"></script>
<script src="js/chart.js"></script>
<script src="js/scoring.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
